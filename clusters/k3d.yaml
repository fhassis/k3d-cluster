apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: dev
servers: 1
agents: 3
image: rancher/k3s:v1.31.6-k3s1
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: "120s"
  k3s:
    extraArgs:
      # Disable the network-policy controller to prevent a flannel startup
      # race condition that causes the k3s server to crash-loop on k3d.
      - arg: "--disable=network-policy"
        nodeFilters:
          - server:*
      # Disable built-in Traefik — ingress-nginx is used instead (see argocd/apps/base/ingress-nginx.yaml).
      - arg: "--disable=traefik"
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
