# Nexus staging overlay — *.staging domain, TLS, dev-level resource limits.

nexus:
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

ingress:
  host: nexus.staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    - hosts:
        - nexus.staging
      # secretName intentionally absent — Traefik uses TLSStore default (kube-system/wildcard-tls)
