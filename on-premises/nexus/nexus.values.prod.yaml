# Nexus prod overlay — real domain, TLS, external PostgreSQL.
# Sonatype strongly recommends PostgreSQL over embedded H2 in containerized prod.
# Deploy a PostgreSQL instance separately (e.g., via Bitnami chart) before enabling this.

nexus:
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

ingress:
  hostRepo: nexus.fhassis.top
  annotations:
    nginx.org/ssl-redirect: "true"
    nginx.org/location-snippets: |
      proxy_set_header Accept-Encoding "";
      sub_filter '</head>' '<script async defer src="https://umami.fhassis.top/script.js" data-website-id="REPLACE_WITH_UUID"></script></head>';
      sub_filter_once on;
      sub_filter_types text/html;
  tls:
    - hosts:
        - nexus.fhassis.top
      # secretName intentionally absent — nginx uses default-ssl-certificate (kube-system/ssl-certificate)

# External PostgreSQL connection.
# Uncomment and configure when PostgreSQL is available.
# nexus:
#   extraEnvVars:
#     - name: INSTALL4J_ADD_VM_PARAMS
#       value: >-
#         -Xms2703m -Xmx2703m
#         -XX:MaxDirectMemorySize=2703m
#         -Djava.util.prefs.userRoot=/nexus-data/javaprefs
#         -Dnexus.datastore.enabled=true
#         -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://<pg-host>:5432/nexus
#         -Dnexus.datastore.nexus.username=nexus
#         -Dnexus.datastore.nexus.password=<password>
