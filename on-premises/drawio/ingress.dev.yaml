# draw.io dev ingress — HTTP on drawio.localhost (k3d port 8080 → cluster :80)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drawio
  namespace: drawio
spec:
  ingressClassName: nginx
  rules:
    - host: drawio.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drawio
                port:
                  number: 80
