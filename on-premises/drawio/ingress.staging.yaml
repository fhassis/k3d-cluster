# draw.io staging ingress — HTTPS on drawio.staging via nginx default-ssl-certificate
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drawio
  namespace: drawio
  annotations:
    nginx.org/ssl-redirect: "true"
    nginx.org/location-snippets: |
      proxy_set_header Accept-Encoding "";
      sub_filter '</head>' '<script async defer src="https://umami.fhassis.top/script.js" data-website-id="REPLACE_WITH_UUID"></script></head>';
      sub_filter_once on;
      sub_filter_types text/html;
spec:
  ingressClassName: nginx
  rules:
    - host: drawio.staging
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drawio
                port:
                  number: 80
  tls:
    - hosts:
        - drawio.staging
      # secretName intentionally absent — nginx uses default-ssl-certificate (kube-system/ssl-certificate)
