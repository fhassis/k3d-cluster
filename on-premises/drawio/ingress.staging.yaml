# draw.io staging ingress — HTTPS on drawio.staging via Traefik TLSStore default
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drawio
  namespace: drawio
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: drawio.staging
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drawio
                port:
                  number: 80
  tls:
    - hosts:
        - drawio.staging
      # secretName intentionally absent — Traefik uses TLSStore default (kube-system/wildcard-tls)
