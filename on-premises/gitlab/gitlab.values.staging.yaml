# GitLab staging overlay — *.staging domain, TLS, dev-level resource limits.

global:
  hosts:
    domain: staging
    https: true
    gitlab:
      name: gitlab.staging
    registry:
      name: registry.staging
    pages:
      name: pages.staging
  ingress:
    class: nginx
    annotations:
      nginx.org/ssl-redirect: "true"
      nginx.org/location-snippets: |
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<script async defer src="https://umami.fhassis.top/script.js" data-website-id="REPLACE_WITH_UUID"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    tls:
      enabled: true
      # secretName intentionally absent — nginx uses default-ssl-certificate (kube-system/ssl-certificate)

gitlab:
  webservice:
    resources:
      requests:
        cpu: "300m"
        memory: "1.5Gi"
      limits:
        cpu: "1500m"
        memory: "3Gi"
  gitaly:
    resources:
      requests:
        cpu: "100m"
        memory: "200Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  workhorse:
    resources:
      requests:
        cpu: "100m"
        memory: "100Mi"
      limits:
        cpu: "500m"
        memory: "500Mi"

postgresql:
  primary:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

redis:
  master:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
