# Excalidraw dev ingress — HTTP on excalidraw.localhost (k3d port 8080 → cluster :80)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: excalidraw
  namespace: excalidraw
spec:
  ingressClassName: nginx
  rules:
    - host: excalidraw.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: excalidraw
                port:
                  number: 80
