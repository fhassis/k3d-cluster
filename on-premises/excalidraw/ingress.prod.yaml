# Excalidraw prod ingress — HTTPS on excalidraw.fhassis.top via Traefik TLSStore default
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: excalidraw
  namespace: excalidraw
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: excalidraw.fhassis.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: excalidraw
                port:
                  number: 80
  tls:
    - hosts:
        - excalidraw.fhassis.top
      # secretName intentionally absent — Traefik uses TLSStore default (kube-system/wildcard-tls)
