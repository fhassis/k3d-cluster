# SonarQube staging overlay — HTTPS on sonarqube.staging via Traefik TLSStore default.

ingress:
  hosts:
    - name: sonarqube.staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    - hosts:
        - sonarqube.staging
      # secretName intentionally absent — Traefik uses TLSStore default (kube-system/wildcard-tls)
