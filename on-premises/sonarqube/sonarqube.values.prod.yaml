# SonarQube prod overlay — HTTPS on sonarqube.fhassis.top, larger resources, external PostgreSQL.

resources:
  requests:
    cpu: "800m"
    memory: "4Gi"
  limits:
    cpu: "4000m"
    memory: "8Gi"

ingress:
  hosts:
    - name: sonarqube.fhassis.top
  annotations:
    nginx.org/ssl-redirect: "true"
    nginx.org/location-snippets: |
      proxy_set_header Accept-Encoding "";
      sub_filter '</head>' '<script async defer src="https://umami.fhassis.top/script.js" data-website-id="REPLACE_WITH_UUID"></script></head>';
      sub_filter_once on;
      sub_filter_types text/html;
  tls:
    - hosts:
        - sonarqube.fhassis.top
      # secretName intentionally absent — nginx uses default-ssl-certificate (kube-system/ssl-certificate)

# Prod: override JDBC credentials via a Kubernetes Secret instead of plaintext.
# Create: kubectl create secret generic sonarqube-jdbc -n sonarqube \
#           --from-literal=password=<db-password> \
#           --from-literal=currentPassword=<current-admin-password>
# Then uncomment:
# jdbcOverwrite:
#   jdbcSecretName: sonarqube-jdbc
#   jdbcSecretPasswordKey: password
