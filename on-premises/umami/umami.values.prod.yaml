# Umami prod overlay — HTTPS on umami.fhassis.top, stronger secret.
# Note: Umami's own ingress intentionally has no sub_filter annotation — no circular tracking.
#
# To set the app secret from a Kubernetes Secret:
#   kubectl create secret generic umami-app-secret -n umami \
#     --from-literal=app-secret=$(openssl rand -hex 32)
# Then set: umami.appSecret.existingSecret: umami-app-secret

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

ingress:
  hosts:
    - host: umami.fhassis.top
      paths:
        - path: /
          pathType: Prefix
  annotations:
    nginx.org/ssl-redirect: "true"
  tls:
    - hosts:
        - umami.fhassis.top
      # secretName intentionally absent — nginx uses default-ssl-certificate (kube-system/ssl-certificate)
