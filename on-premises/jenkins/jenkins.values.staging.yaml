# Jenkins staging overlay — *.staging domain, TLS, dev-level resource limits.

controller:
  jenkinsUrl: "https://jenkins.staging"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  ingress:
    enabled: true
    ingressClassName: nginx
    hostName: jenkins.staging
    annotations:
      nginx.org/ssl-redirect: "true"
      nginx.org/location-snippets: |
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<script async defer src="https://umami.fhassis.top/script.js" data-website-id="REPLACE_WITH_UUID"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    tls:
      - hosts:
          - jenkins.staging
        # secretName intentionally absent — nginx uses default-ssl-certificate (kube-system/ssl-certificate)
