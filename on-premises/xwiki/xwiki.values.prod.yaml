# XWiki prod overlay — real domain, TLS, production resources.

postgresql:
  auth:
    password: ""   # set via external Secret in prod (do not commit passwords)

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

ingress:
  annotations:
    nginx.org/ssl-redirect: "true"
    nginx.org/location-snippets: |
      proxy_set_header Accept-Encoding "";
      sub_filter '</head>' '<script async defer src="https://umami.fhassis.top/script.js" data-website-id="REPLACE_WITH_UUID"></script></head>';
      sub_filter_once on;
      sub_filter_types text/html;
  hosts:
    - host: xwiki.fhassis.top
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - xwiki.fhassis.top
      # secretName intentionally absent — nginx uses default-ssl-certificate (kube-system/ssl-certificate)
