---
# draw.io — stateless diagramming tool. Uses directory source (no Helm chart).
# Env-specific ingress must be applied separately or via a Kustomize overlay.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: drawio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/fhassis/k8s-cluster.git
    targetRevision: HEAD
    path: on-premises/drawio
    directory:
      exclude: "ingress.*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: drawio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
