---
# SonarQube DB — PostgreSQL backend for SonarQube. Must be ready before sonarqube wave.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube-db
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: "16.6.3"
      helm:
        valueFiles:
          - $values/on-premises/sonarqube/postgresql.values.yaml
    - repoURL: https://github.com/fhassis/k8s-cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# SonarQube — static code analysis. Depends on sonarqube-db (same wave; DB starts first via pod readiness).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: https://SonarSource.github.io/helm-chart-sonarqube
      chart: sonarqube
      targetRevision: "2026.2.1"
      helm:
        valueFiles:
          - $values/on-premises/sonarqube/sonarqube.values.yaml
    - repoURL: https://github.com/fhassis/k8s-cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
