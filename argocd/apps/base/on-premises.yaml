# On-premises tools — base Application manifests
#
# Four applications served to internal teams:
#   Jenkins  — CI/CD automation server
#   GitLab   — Git hosting, issue tracking, container registry, pages
#   Nexus    — Artifact repository (Maven, npm, Docker, PyPI)
#   XWiki    — Internal wiki / knowledge base
#
# Sync waves respect startup order and resource weight:
#   Wave 3 — Jenkins, Nexus, XWiki (independent, lighter)
#   Wave 4 — GitLab (heaviest, ~8 GB RAM; starts last to avoid node pressure)
#
# Storage: all apps use storageClass: longhorn.
#   Dev            → local-path provisioner (k3s built-in, no config needed)
#   Staging / Prod → real Longhorn block storage (deployed at wave -1)
#
# Env-specific values (ingress host, TLS, resource limits) are patched in by
# the staging/ and prod/ Kustomize overlays.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: https://charts.jenkins.io
      chart: jenkins
      targetRevision: "5.9.18"
      helm:
        valueFiles:
          - $values/on-premises/jenkins/jenkins.values.yaml
    - repoURL: https://github.com/fhassis/k8s-cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
