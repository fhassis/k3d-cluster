# Observability stack — prod environment
#
# Same structure as dev. Differences from dev:
#   - Chart versions pinned (replace "*" with specific versions before deploying)
#   - Grafana ingress uses real domain + TLS secret (wildcard-tls)
#   - k8s-monitoring cluster name set to prod
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/observability/prometheus.values.yaml
    - repoURL: https://github.com/fhassis/k3d-cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
