# Staging: applies Traefik TLSStore pointing to kube-system/wildcard-tls.
# Pre-requisite: generate a self-signed wildcard cert and load it as a Secret
# before first sync (see clusters/multipass/README.md § TLS).
# Wave -1 ensures TLSStore exists before any application Ingress is created.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certificates
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/fhassis/k8s-cluster.git
    targetRevision: HEAD
    path: certificates
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
