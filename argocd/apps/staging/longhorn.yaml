# Staging: deploys Longhorn block storage via Helm.
# Must run before any on-premises app PVC is created (sync wave -1).
# Pre-requisite: open-iscsi installed and iscsi_tcp loaded on all nodes (handled by cloud-init).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.11.1"
      helm:
        valueFiles:
          - $values/longhorn/longhorn.values.yaml
    - repoURL: https://github.com/fhassis/k8s-cluster.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
