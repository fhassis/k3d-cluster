# Bootstrap Application (prod) — apply this once after ArgoCD is installed
# on the production cluster.
#
# Usage:
#   kubectl apply -f argocd/bootstrap.prod.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fhassis/k8s-cluster.git
    targetRevision: HEAD
    path: argocd/apps/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
